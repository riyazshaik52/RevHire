<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join RevHire - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #a855f7;
            --bg-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 580px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: var(--bg-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 8px;
            display: block;
        }

        h1 {
            font-size: 28px;
            color: var(--text-main);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }

        .option {
            background: white;
            border: 2px solid #f1f5f9;
            border-radius: 24px;
            padding: 32px 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .option:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.1);
        }

        .option.employer:hover {
            border-color: var(--secondary);
            box-shadow: 0 20px 25px -5px rgba(168, 85, 247, 0.1);
        }

        .icon-box {
            width: 72px;
            height: 72px;
            background: #f8fafc;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            transition: all 0.3s;
        }

        .option:hover .icon-box {
            background: var(--bg-gradient);
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        .option h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .option p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .login-link {
            font-size: 15px;
            color: var(--text-muted);
            padding-top: 32px;
            border-top: 1px solid #f1f5f9;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .options {
                grid-template-columns: 1fr;
            }

            .auth-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <a href="/" style="text-decoration: none;"><span class="logo-text">RevHire</span></a>
        <h1>Create your account</h1>
        <p class="subtitle">Join the professional network that's building the future of work.</p>

        <div class="options">
            <a href="/auth/register/jobseeker" class="option">
                <div class="icon-box">👤</div>
                <div>
                    <h3>I'm a Job Seeker</h3>
                    <p>Find opportunities and build your career portfolio</p>
                </div>
            </a>

            <a href="/auth/register/employer" class="option employer">
                <div class="icon-box">🏢</div>
                <div>
                    <h3>I'm an Employer</h3>
                    <p>Post positions and discover world-class talent</p>
                </div>
            </a>
        </div>

        <div class="login-link">
            Already have an account? <a href="/auth/login">Log In</a>
        </div>
    </div>
</body>

</html>
