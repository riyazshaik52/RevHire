# ============================================
# ACTIVE PROFILE - Change this to switch databases
# ============================================
spring.profiles.active=oracle

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
spring.application.name=RevHire

# ============================================
# ORACLE DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xe
spring.datasource.username=Revhire2 
spring.datasource.password=revhire2 
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.Oracle10gDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# ============================================
# COMMON CONFIGURATION
# ============================================
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.servlet.multipart.enabled=true
file.upload-dir=uploads/resumes
# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-digit-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password reset token expiration (24 hours)
app.passwordReset.tokenExpiration=86400000